<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROMPEX • Financeiro</title>
<link rel="icon" type="image/png" href="../Rompex_Favicon_Transparente.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0A0E1A;
  --bg-secondary:#0F172A;
  --bg-tertiary:#1E293B;
  --bg-card:#1E3A52;
  --accent:#10B981;
  --accent-hover:#059669;
  --accent-light:rgba(16,185,129,0.1);
  --text-primary:#F8FAFC;
  --text-secondary:#94A3B8;
  --text-muted:#64748B;
  --border:#1E293B;
  --border-light:#334155;
  --info:#3B82F6;
  --warning:#F59E0B;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --sidebar-width:280px;
}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  font-size:14px;
  min-height:100vh;
  line-height:1.6;
}
.layout{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-width);
  background:var(--bg-secondary);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  z-index:100;
}
.main-content{
  flex:1;
  margin-left:var(--sidebar-width);
  display:flex;
  flex-direction:column;
}
.sidebar-logo{
  padding:24px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:14px;
}
.logo-icon{
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo-icon img{
  width:100%;
  height:100%;
  object-fit:contain;
}
.logo-text{
  display:none;
}
.logo-title{
  font-size:18px;
  font-weight:800;
  color:var(--text-primary);
  letter-spacing:-0.03em;
}
.logo-subtitle{
  font-size:10px;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.1em;
  font-weight:600;
}
.sidebar-nav{
  flex:1;
  padding:16px;
  overflow-y:auto;
}
.nav-section{
  margin-bottom:24px;
}
.nav-section-title{
  font-size:11px;
  font-weight:700;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.12em;
  padding:8px 12px 12px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:var(--radius-sm);
  color:var(--text-secondary);
  cursor:pointer;
  transition:all 0.2s;
  margin-bottom:4px;
  position:relative;
  font-size:14px;
  font-weight:500;
  text-decoration:none;
}
.nav-item svg{
  width:20px;
  height:20px;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
  flex-shrink:0;
}
.nav-item:hover{
  background:rgba(16,185,129,0.08);
  color:var(--text-primary);
}
.nav-item.active{
  background:var(--accent-light);
  color:var(--accent);
  font-weight:600;
}
.nav-item.active::before{
  content:'';
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  width:4px;
  height:20px;
  background:var(--accent);
  border-radius:0 4px 4px 0;
}
.nav-expand-icon{
  margin-left:auto;
  width:16px;
  height:16px;
  transition:transform 0.2s;
}
.nav-item.expanded .nav-expand-icon{
  transform:rotate(90deg);
}
.nav-submenu{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.3s ease;
  padding-left:32px;
}
.nav-submenu.open{
  max-height:500px;
}
.nav-submenu .nav-item{
  font-size:13px;
  padding:10px 12px;
}
.sidebar-user{
  padding:20px;
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
}
.user-avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
  color:#fff;
  flex-shrink:0;
}
.user-info{flex:1;min-width:0}
.user-name{
  font-size:14px;
  font-weight:600;
  color:var(--text-primary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.user-role{font-size:12px;color:var(--text-muted)}
.user-menu{cursor:pointer;padding:4px;border-radius:6px;transition:0.2s}
.user-menu:hover{background:var(--bg-tertiary)}
.user-menu svg{width:18px;height:18px;stroke:var(--text-secondary);fill:none}
.topbar{
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  padding:16px 32px;
  display:flex;
  align-items:center;
  gap:20px;
  position:sticky;
  top:0;
  z-index:50;
}
.page-title{
  font-size:22px;
  font-weight:700;
  color:var(--text-primary);
  letter-spacing:-0.02em;
}
.page-subtitle{
  font-size:13px;
  color:var(--text-muted);
  margin-top:2px;
}
.topbar-right{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:12px;
}
.topbar-btn{
  padding:10px 16px;
  border-radius:var(--radius-sm);
  background:var(--bg-tertiary);
  border:1px solid var(--border-light);
  color:var(--text-secondary);
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:600;
  transition:all 0.2s;
  text-decoration:none;
}
.topbar-btn svg{
  width:18px;
  height:18px;
  stroke:currentColor;
  fill:none;
}
.topbar-btn:hover{
  background:var(--bg-card);
  color:var(--text-primary);
  border-color:var(--accent);
}
.content{
  padding:32px;
  flex:1;
  max-width:1200px;
  margin:0 auto;
  width:100%;
}
.hero{
  background:linear-gradient(135deg,var(--accent) 0%,#059669 100%);
  border-radius:var(--radius);
  padding:48px 40px;
  text-align:center;
  margin-bottom:32px;
  color:#fff;
  box-shadow:0 8px 32px rgba(16,185,129,0.3);
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;
  top:-50%;
  right:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);
}
.hero-icon{
  font-size:64px;
  margin-bottom:16px;
  position:relative;
}
.hero h1{
  font-size:36px;
  margin-bottom:12px;
  position:relative;
  font-weight:800;
  letter-spacing:-0.02em;
}
.hero p{
  font-size:16px;
  opacity:0.95;
  position:relative;
}
.card{
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:28px;
  margin-bottom:24px;
  box-shadow:var(--shadow);
}
.card h2{
  font-size:20px;
  margin-bottom:16px;
  color:var(--text-primary);
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
}
.card h2 svg{
  width:24px;
  height:24px;
  stroke:var(--accent);
  fill:none;
}
.card p{
  color:var(--text-secondary);
  line-height:1.7;
  margin-bottom:20px;
}
.feature-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
  margin-top:24px;
}
.feature-card{
  background:var(--bg-tertiary);
  padding:24px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border-light);
  transition:all 0.2s;
}
.feature-card:hover{
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(16,185,129,0.15);
}
.feature-card .icon{
  width:48px;
  height:48px;
  background:var(--accent-light);
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:16px;
}
.feature-card .icon svg{
  width:24px;
  height:24px;
  stroke:var(--accent);
  fill:none;
}
.feature-card h3{
  font-size:16px;
  color:var(--text-primary);
  margin-bottom:8px;
  font-weight:600;
}
.feature-card p{
  font-size:13px;
  color:var(--text-muted);
  line-height:1.6;
  margin:0;
}
.coming-soon{
  background:rgba(59,130,246,0.1);
  border:2px dashed rgba(59,130,246,0.4);
  padding:32px;
  border-radius:var(--radius);
  text-align:center;
  margin-top:24px;
}
.coming-soon-icon{
  width:64px;
  height:64px;
  background:rgba(59,130,246,0.2);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 16px;
}
.coming-soon-icon svg{
  width:32px;
  height:32px;
  stroke:var(--info);
  fill:none;
}
.coming-soon h3{
  color:var(--info);
  font-size:20px;
  margin-bottom:8px;
  font-weight:700;
}
.coming-soon p{
  color:#93C5FD;
  margin:0;
}
.comparison{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:24px;
  margin-top:20px;
}
.comparison-col h3{
  color:var(--accent);
  margin-bottom:16px;
  font-size:16px;
  font-weight:700;
  display:flex;
  align-items:center;
  gap:8px;
}
.comparison-col h3 svg{
  width:20px;
  height:20px;
  stroke:currentColor;
  fill:none;
}
.comparison-col ul{
  list-style:none;
  padding:0;
  color:var(--text-secondary);
  line-height:2;
}
.comparison-col li{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
}
.comparison-col li::before{
  content:'✓';
  color:var(--accent);
  font-weight:bold;
  font-size:16px;
}
@media(max-width:768px){
  .comparison{
    grid-template-columns:1fr;
  }
  .feature-grid{
    grid-template-columns:1fr;
  }
  .sidebar{
    transform:translateX(-100%);
  }
  .main-content{
    margin-left:0;
  }
}
</style>
</head>
