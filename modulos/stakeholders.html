<!--
   ROMPEX • Stakeholders — fragment

   Este arquivo NAO eh mais uma pagina standalone. Eh um fragment de modulo,
   carregado por router.js dentro do shell (dashboard.html).

   Quando alguem acessa este arquivo DIRETO pela URL do navegador (bookmark
   antigo, refresh em /modulos/stakeholders.html), o script de guard logo
   abaixo detecta a ausencia do shell (sem <aside class="sidebar"> no document)
   e redireciona pra dashboard.html#stakeholders.

   Quando o router puxa via fetch + DOMParser e re-injeta os <script> via
   createElement, o documento HOSPEDEIRO ja eh o shell, logo a sidebar existe,
   logo o guard nao redireciona.

   TODO o JS deste modulo vive dentro de UMA IIFE pra que const/let/class
   nao colidam na re-execucao (visitar #stakeholders, sair, voltar). O que
   precisa estar acessivel pros onclick=/oninput= inline a gente expoe via
   Object.assign(window, publics) e limpa via __moduleCleanup que o proprio
   modulo registra.
-->

<script>
/* ============ SPA guard ============
   Se este arquivo for aberto direto no navegador (sem o shell), redireciona
   pra dashboard.html#stakeholders. No contexto do shell, a sidebar ja existe
   e a condicao eh falsa → no-op. */
(function(){
  if (!document.querySelector('aside.sidebar')) {
    location.replace('../dashboard.html#stakeholders');
  }
})();
</script>

        <button type="button" class="btn-clear" onclick="showLista()">Cancelar</button>
        <button type="button" class="btn-save" id="btn-salvar" onclick="submitForm()">Salvar</button>
      </div>
    </div>
  </div>
</main>

<script>
/* ============================================================================
   Stakeholders — modulo SPA. TODO o codigo dentro de IIFE.
   Const/let/class ficam no closure → nada estoura "Identifier already
   declared" na 2a visita.

   Publics expostos em window pros onclick=/oninput= inline encontrarem.
   Cleanup registrado em window.__moduleCleanup pro router executar antes
   de carregar o proximo modulo (deleta os publics, limpa timers).

   toggleSubmenu / fazerLogout / verificarAutenticacao etc vem do SHELL
   (dashboard.html / auth.js) — nao redefinimos aqui.
   ============================================================================ */
(function(){
  'use strict';

  /* ============ Modais locais rxAlert / rxConfirm ============
     Mantidos dentro do closure pra nao poluir window. Sao chamados so do JS
     do modulo, nunca de onclick= inline. */
  var ICONS  = { info:'i', success:'✓', warning:'!', error:'⨯', confirm:'?', prompt:'✎' };
  var TITLES = { info:'Aviso', success:'Sucesso', warning:'Atencao', error:'Erro', confirm:'Confirmacao' };

  function buildOverlay(html){
    var ov = document.createElement('div');
    ov.className = 'rx-modal-overlay show';
    ov.innerHTML = html;
    document.body.appendChild(ov);
    return ov;
  }
  function closeOverlay(ov, onKey){
    if (onKey) document.removeEventListener('keydown', onKey);
    ov.style.animation = 'rxOvIn 0.15s reverse';
    setTimeout(function(){ if (ov.parentNode) ov.remove(); }, 140);
  }
  function rxAlert(msg, type){
    return new Promise(function(resolve){
      type = type || 'info';
      var ov = buildOverlay(
        '<div class="rx-modal-box">' +
          '<div class="rx-modal-header">' +
            '<div class="rx-modal-icon ' + type + '">' + (ICONS[type] || 'i') + '</div>' +
            '<div class="rx-modal-text"><div class="rx-modal-title"></div><div class="rx-modal-body"></div></div>' +
          '</div>' +
          '<div class="rx-modal-actions"><button class="rx-modal-btn primary" data-act="ok">OK</button></div>' +
        '</div>'
      );
      ov.querySelector('.rx-modal-title').textContent = TITLES[type] || 'Aviso';
      ov.querySelector('.rx-modal-body').textContent = msg;
      function close(){ closeOverlay(ov, onKey); resolve(); }
      function onKey(e){ if (e.key === 'Escape' || e.key === 'Enter') close(); }
      ov.querySelector('[data-act=ok]').addEventListener('click', close);
      ov.addEventListener('click', function(e){ if (e.target === ov) close(); });
      document.addEventListener('keydown', onKey);
      setTimeout(function(){ ov.querySelector('[data-act=ok]').focus(); }, 50);
    });
  }
  function rxConfirm(msg, opts){
    return new Promise(function(resolve){
      opts = opts || {};
      var iconType = opts.dangerous ? 'warning' : 'confirm';
      var btnClass = opts.dangerous ? 'danger' : 'primary';
      var ov = buildOverlay(
        '<div class="rx-modal-box">' +
          '<div class="rx-modal-header">' +
            '<div class="rx-modal-icon ' + iconType + '">' + ICONS[iconType] + '</div>' +
            '<div class="rx-modal-text"><div class="rx-modal-title"></div><div class="rx-modal-body"></div></div>' +
          '</div>' +
          '<div class="rx-modal-actions">' +
            '<button class="rx-modal-btn" data-act="cancel"></button>' +
            '<button class="rx-modal-btn ' + btnClass + '" data-act="ok"></button>' +
          '</div>' +
        '</div>'
      );
      ov.querySelector('.rx-modal-title').textContent = opts.title || 'Confirmar';
      ov.querySelector('.rx-modal-body').textContent = msg;
      ov.querySelector('[data-act=cancel]').textContent = opts.cancelText || 'Cancelar';
      ov.querySelector('[data-act=ok]').textContent = opts.okText || 'Confirmar';
      function close(v){ closeOverlay(ov, onKey); resolve(v); }
      function onKey(e){ if (e.key === 'Escape') close(false); if (e.key === 'Enter') close(true); }
      ov.querySelector('[data-act=cancel]').addEventListener('click', function(){ close(false); });
      ov.querySelector('[data-act=ok]').addEventListener('click', function(){ close(true); });
      ov.addEventListener('click', function(e){ if (e.target === ov) close(false); });
      document.addEventListener('keydown', onKey);
      setTimeout(function(){ ov.querySelector('[data-act=ok]').focus(); }, 50);
    });
  }

  /* ============ State ============ */
  var TAB_ATUAL = 'clientes';
  var DB = { clientes: [], fornecedores: [] };
  var FILTROS = {
    clientes:     { tipo: '', mostrarInativos: false },
    fornecedores: { tipo: '', mostrarInativos: false },
  };
  var TIPO_PESSOA_FORM = 'PF';
  var NOME_TOCADO = false;
  var RAZAO_TOCADA = false;
  var debounceTimer = null;

  /* ============ Config / fetch helpers ============ */
  function cfg() { return window.ROMPEX_COMPRAS_CONFIG || {}; }
  function authHeaders() {
    var c = cfg();
    return {
      'Content-Type': 'application/json',
      'apikey': c.SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + c.SUPABASE_ANON_KEY,
    };
  }
  function urlListar(tab){ return cfg()[tab==='clientes'?'SUPABASE_LIST_CLI_URL':'SUPABASE_LIST_FORN_URL']; }
  function urlSalvar(tab){ return cfg()[tab==='clientes'?'SUPABASE_SAVE_CLI_URL':'SUPABASE_SAVE_FORN_URL']; }
  function chaveLista(tab){ return tab==='clientes'?'clientes':'fornecedores'; }

  /* ============ Guard: confirma que o host ainda eh stakeholders =========
     Se durante um fetch o usuario sair pra outro modulo, o host trocou
     de dataset.module. Evita renderizar em DOM que nao eh mais nosso. */
  function stillMine() {
    var host = document.getElementById('module-host');
    return !host || host.getAttribute('data-module') === 'stakeholders';
  }

  /* ============ LISTAR ============ */
  async function listar(tab) {
    var url = urlListar(tab);
    if (!url) { console.warn('[STK] URL listar nao configurada'); return; }
    var inputBusca = document.getElementById('busca-' + tab);
    var search = inputBusca ? inputBusca.value.trim() : '';
    var f = FILTROS[tab];

    renderSkeleton(tab);
    try {
      var resp = await fetch(url, {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({
          search: search || undefined,
          tipo_pessoa: f.tipo || undefined,
          ativo: f.mostrarInativos ? false : true,
          limit: 200,
        }),
      });
      var data = await resp.json();
      if (!stillMine()) return; /* usuario saiu do modulo */
      if (!resp.ok || !data.ok) {
        console.warn('[STK] Falha listar:', data);
        renderEmpty(tab, 'Erro ao carregar: ' + (data.error || 'falha de rede'));
        return;
      }
      DB[tab] = data[chaveLista(tab)] || [];
      renderTabela(tab);
    } catch (err) {
      if (!stillMine()) return;
      console.warn('[STK] Erro de rede:', err);
      renderEmpty(tab, 'Falha de rede. Tente novamente.');
    }
  }

  function renderSkeleton(tab) {
    var wrap = document.getElementById('lista-' + tab);
    if (!wrap) return;
    var skel = '<div class="stk-card">';
    for (var i = 0; i < 5; i++) {
      skel += '<div class="stk-skel-row">' +
                '<div class="stk-skel-box stk-skel-avt"></div>' +
                '<div style="flex:1"><div class="stk-skel-box" style="width:60%;margin-bottom:6px"></div>' +
                '<div class="stk-skel-box" style="width:40%;height:11px"></div></div>' +
                '<div class="stk-skel-box" style="width:120px"></div>' +
                '<div class="stk-skel-box" style="width:60px"></div>' +
              '</div>';
    }
    skel += '</div>';
    wrap.innerHTML = skel;
  }

  function renderEmpty(tab, msg) {
    var wrap = document.getElementById('lista-' + tab);
    if (!wrap) return;
    var rotulo = tab === 'clientes' ? 'cliente' : 'fornecedor';
    wrap.innerHTML =
      '<div class="stk-empty">' +
        '<div class="stk-empty-icon">' +
          '<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>' +
        '</div>' +
        '<h3>' + (msg ? 'Nada encontrado' : 'Nenhum ' + rotulo + ' cadastrado') + '</h3>' +
        '<p>' + (msg || 'Cadastre o primeiro ' + rotulo + ' pra começar a usar nas compras.') + '</p>' +
        '<button onclick="showForm(\'novo\')">' +
          '<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>' +
          'Cadastrar ' + rotulo +
        '</button>' +
      '</div>';
  }

  function renderTabela(tab) {
    var wrap = document.getElementById('lista-' + tab);
    if (!wrap) return;
    var rows = DB[tab];
    if (!rows.length) { renderEmpty(tab); return; }

    var html = '<div class="stk-card"><table class="stk-table"><thead><tr>';
    html += '<th>Nome</th>';
    html += '<th class="col-doc">Documento</th>';
    html += '<th class="col-meta">Localização</th>';
    html += '<th class="col-meta">Contato</th>';
    html += '<th class="right">Ações</th>';
    html += '</tr></thead><tbody>';

    rows.forEach(function(r) {
      var cls = r.ativo ? '' : 'inativo';
      var ini = (r.nome || '??').trim().split(/\s+/).slice(0,2).map(function(p){return p[0]||'';}).join('').toUpperCase().substring(0,2);
      var nomeAlt = (r.tipo_pessoa === 'PJ' && r.nome_fantasia && r.nome_fantasia !== r.nome) ? r.nome_fantasia : '';
      var docF = formatarDoc(r.documento, r.tipo_pessoa);
      var localBits = [];
      if (r.cidade) localBits.push(r.cidade);
      if (r.uf) localBits.push(r.uf);
      var local = localBits.length ? escHtml(localBits.join('/')) : '<span class="stk-meta-empty">—</span>';
      var contato = r.telefone || r.email || '';
      var contatoCell = contato ? escHtml(contato) : '<span class="stk-meta-empty">—</span>';
      var subInfo = r.tipo_pessoa + ' · ' + docF;

      html += '<tr class="' + cls + '">';
      html +=   '<td><div class="stk-nome-cell">';
      html +=     '<div class="stk-avatar ' + r.tipo_pessoa + '" title="' + r.tipo_pessoa + '">' + escHtml(ini) + '</div>';
      html +=     '<div class="stk-nome-info">';
      html +=       '<strong>' + escHtml(r.nome) + (nomeAlt ? ' <small style="font-weight:500;color:var(--text-muted);font-size:12px"> · ' + escHtml(nomeAlt) + '</small>' : '') + (!r.ativo ? ' <span style="color:var(--text-muted);font-size:11px;font-weight:500">(inativo)</span>' : '') + '</strong>';
      html +=       '<small>' + subInfo + '</small>';
      html +=     '</div>';
      html +=   '</div></td>';
      html +=   '<td class="col-doc stk-meta" style="font-variant-numeric:tabular-nums">' + docF + '</td>';
      html +=   '<td class="col-meta stk-meta">' + local + '</td>';
      html +=   '<td class="col-meta stk-meta">' + contatoCell + '</td>';
      html +=   '<td><div class="stk-acoes">';
      html +=     '<button class="stk-acao-btn" onclick="editar(\'' + tab + '\',\'' + r.id + '\')" title="Editar">';
      html +=       '<svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';
      html +=     '</button>';
      if (r.ativo) {
        html += '<button class="stk-acao-btn danger" onclick="desativar(\'' + tab + '\',\'' + r.id + '\')" title="Desativar">';
        html +=   '<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>';
        html += '</button>';
      } else {
        html += '<button class="stk-acao-btn" onclick="reativar(\'' + tab + '\',\'' + r.id + '\')" title="Reativar">';
        html +=   '<svg viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10"/></svg>';
        html += '</button>';
      }
      html +=   '</div></td>';
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    wrap.innerHTML = html;
  }

  /* ============ BUSCA + CHIPS DE FILTRO ============ */
  function onBusca(tab) {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function(){ listar(tab); }, 300);
  }
  function setChipTipo(tab, value) {
    FILTROS[tab].tipo = value;
    var grupo = document.querySelector('.stk-chips[data-tab="'+tab+'"][data-group="tipo"]');
    if (grupo) {
      grupo.querySelectorAll('.stk-chip').forEach(function(c){
        c.classList.toggle('active', c.dataset.tipo === value);
      });
    }
    listar(tab);
  }
  function toggleInativos(tab) {
    FILTROS[tab].mostrarInativos = !FILTROS[tab].mostrarInativos;
    var chip = document.getElementById('chip-inativos-' + tab);
    if (chip) chip.classList.toggle('active', FILTROS[tab].mostrarInativos);
    listar(tab);
  }

  /* ============ TABS ============ */
  function switchTab(tab, btn) {
    document.querySelectorAll('.nav-tab').forEach(function(b){ b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
    var p = document.getElementById('panel-' + tab);
    if (p) p.classList.add('active');
    TAB_ATUAL = tab;
    if (!DB[tab].length) listar(tab);
  }

  /* ============ VIEW SWITCHING: lista <-> form inline ============ */
  function showForm(modo, dados) {
    var papel = TAB_ATUAL === 'clientes' ? 'cliente' : 'fornecedor';
    document.getElementById('form-papel').value = papel;

    if (modo === 'edit' && dados) {
      document.getElementById('form-id').value = dados.id;
      document.getElementById('page-h1').textContent = 'Editar ' + papel;
      document.getElementById('page-sub').textContent = dados.nome || '';

      document.getElementById('form-nome').value = dados.nome || '';
      document.getElementById('form-documento').value = formatarDoc(dados.documento, dados.tipo_pessoa);
      document.getElementById('form-razao-social').value = dados.razao_social || '';
      document.getElementById('form-nome-fantasia').value = dados.nome_fantasia || '';
      document.getElementById('form-ie').value = dados.inscricao_estadual || '';
      document.getElementById('form-im').value = dados.inscricao_municipal || '';
      document.getElementById('form-regime').value = dados.regime_tributario || '';
      document.getElementById('form-telefone').value = dados.telefone || '';
      document.getElementById('form-email').value = dados.email || '';
      document.getElementById('form-cep').value = dados.cep ? formatarCEP(dados.cep) : '';
      document.getElementById('form-logradouro').value = dados.logradouro || '';
      document.getElementById('form-numero').value = dados.numero || '';
      document.getElementById('form-complemento').value = dados.complemento || '';
      document.getElementById('form-bairro').value = dados.bairro || '';
      document.getElementById('form-uf').value = dados.uf || '';
      document.getElementById('form-cidade').value = dados.cidade || '';
      document.getElementById('form-pais').value = dados.pais || 'BR';

      setTipoPessoa(dados.tipo_pessoa);
      NOME_TOCADO = true;
      RAZAO_TOCADA = true;
    } else {
      document.getElementById('form-id').value = '';
      document.getElementById('page-h1').textContent = 'Novo ' + papel;
      document.getElementById('page-sub').textContent = 'Apenas nome e CPF/CNPJ são obrigatórios.';
      resetForm();
      setTipoPessoa('PF');
    }

    document.getElementById('view-lista').classList.remove('active');
    document.getElementById('view-form').classList.add('active');
    document.getElementById('tab-pills-wrap').style.display = 'none';
    document.getElementById('btn-novo').style.display = 'none';
    document.getElementById('btn-voltar').style.display = '';

    window.scrollTo({top:0, behavior:'instant'});
    setTimeout(function(){
      var nm = document.getElementById('form-nome');
      if (nm) nm.focus();
    }, 80);
  }

  function editar(tab, id) {
    var r = DB[tab].find(function(x){ return x.id === id; });
    if (!r) return;
    TAB_ATUAL = tab;
    showForm('edit', r);
  }

  function showLista() {
    document.getElementById('view-form').classList.remove('active');
    document.getElementById('view-lista').classList.add('active');
    document.getElementById('tab-pills-wrap').style.display = '';
    document.getElementById('btn-novo').style.display = '';
    document.getElementById('btn-voltar').style.display = 'none';
    document.getElementById('page-h1').textContent = 'Stakeholders';
    document.getElementById('page-sub').textContent = 'Clientes e fornecedores cadastrados';
  }

  function resetForm() {
    ['form-nome','form-documento','form-razao-social','form-nome-fantasia','form-ie','form-im',
     'form-regime','form-telefone','form-email','form-cep','form-logradouro','form-numero',
     'form-complemento','form-bairro','form-uf','form-cidade'].forEach(function(id){
      var el = document.getElementById(id);
      if (el) el.value = '';
    });
    var pais = document.getElementById('form-pais');
    if (pais) pais.value = 'BR';
    NOME_TOCADO = false;
    RAZAO_TOCADA = false;
  }

  function setTipoPessoa(tipo) {
    TIPO_PESSOA_FORM = tipo;
    document.getElementById('tipo-pf-btn').classList.toggle('active', tipo === 'PF');
    document.getElementById('tipo-pj-btn').classList.toggle('active', tipo === 'PJ');
    document.getElementById('pj-block').classList.toggle('show', tipo === 'PJ');
    document.getElementById('doc-label').textContent = tipo === 'PF' ? 'CPF' : 'CNPJ';
    document.getElementById('form-documento').placeholder = tipo === 'PF' ? '000.000.000-00' : '00.000.000/0000-00';
    aplicarMascaraDoc();
  }

  /* nome -> razao social (so PJ, nao sobrescreve se voce editou razao) */
  function onNomeChange() {
    NOME_TOCADO = true;
    if (TIPO_PESSOA_FORM === 'PJ' && !RAZAO_TOCADA) {
      document.getElementById('form-razao-social').value = document.getElementById('form-nome').value;
    }
  }

  /* ============ MASCARAS ============ */
  function aplicarMascaraDoc() {
    var el = document.getElementById('form-documento');
    if (!el) return;
    var v = el.value.replace(/\D/g,'');
    if (TIPO_PESSOA_FORM === 'PF') {
      v = v.substring(0,11);
      if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
      else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
      else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    } else {
      v = v.substring(0,14);
      if (v.length > 12) v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{1,2})/, '$1.$2.$3/$4-$5');
      else if (v.length > 8) v = v.replace(/(\d{2})(\d{3})(\d{3})(\d{1,4})/, '$1.$2.$3/$4');
      else if (v.length > 5) v = v.replace(/(\d{2})(\d{3})(\d{1,3})/, '$1.$2.$3');
      else if (v.length > 2) v = v.replace(/(\d{2})(\d{1,3})/, '$1.$2');
    }
    el.value = v;
  }
  function aplicarMascaraCEP() {
    var el = document.getElementById('form-cep');
    if (!el) return;
    var v = el.value.replace(/\D/g,'').substring(0,8);
    if (v.length > 5) v = v.replace(/(\d{5})(\d{1,3})/, '$1-$2');
    el.value = v;
  }
  function formatarDoc(doc, tipo) {
    if (!doc) return '—';
    var d = String(doc).replace(/\D/g,'');
    if (tipo === 'PF' && d.length === 11) return d.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    if (tipo === 'PJ' && d.length === 14) return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, '$1.$2.$3/$4-$5');
    return d;
  }
  function formatarCEP(cep) {
    var d = String(cep).replace(/\D/g,'');
    return d.length === 8 ? d.replace(/(\d{5})(\d{3})/, '$1-$2') : d;
  }

  /* ============ VIACEP ============ */
  async function buscarCEP() {
    var cepEl = document.getElementById('form-cep');
    if (!cepEl) return;
    var cep = cepEl.value.replace(/\D/g,'');
    if (cep.length !== 8) return;
    try {
      var resp = await fetch('https://viacep.com.br/ws/' + cep + '/json/');
      var data = await resp.json();
      if (!stillMine()) return;
      if (data.erro) return;
      var setIf = function(id, val){
        var el = document.getElementById(id);
        if (el && !el.value) el.value = val || '';
      };
      setIf('form-logradouro', data.logradouro);
      setIf('form-bairro',     data.bairro);
      setIf('form-cidade',     data.localidade);
      setIf('form-uf',         data.uf);
    } catch (err) { console.warn('[CEP] falha:', err); }
  }

  /* ============ SUBMIT ============ */
  async function submitForm() {
    var btn = document.getElementById('btn-salvar');
    if (!btn || btn.dataset.salvando === '1') return;

    var papel = document.getElementById('form-papel').value;
    var tab = papel === 'cliente' ? 'clientes' : 'fornecedores';
    var id = document.getElementById('form-id').value || null;

    var nome = document.getElementById('form-nome').value.trim();
    var documento = document.getElementById('form-documento').value.replace(/\D/g,'');

    if (!nome || nome.length < 2) { await rxAlert('Nome obrigatório (mín 2 caracteres).', 'warning'); return; }
    if (TIPO_PESSOA_FORM === 'PF' && documento.length !== 11) { await rxAlert('CPF inválido. Precisa ter 11 dígitos.', 'warning'); return; }
    if (TIPO_PESSOA_FORM === 'PJ' && documento.length !== 14) { await rxAlert('CNPJ inválido. Precisa ter 14 dígitos.', 'warning'); return; }

    btn.dataset.salvando = '1';
    btn.disabled = true;
    btn.textContent = 'Salvando…';

    var payload = {
      tipo_pessoa: TIPO_PESSOA_FORM,
      nome: nome,
      documento: documento,
      telefone: document.getElementById('form-telefone').value.trim() || null,
      email: document.getElementById('form-email').value.trim() || null,
      cep: document.getElementById('form-cep').value.trim() || null,
      logradouro: document.getElementById('form-logradouro').value.trim() || null,
      numero: document.getElementById('form-numero').value.trim() || null,
      complemento: document.getElementById('form-complemento').value.trim() || null,
      bairro: document.getElementById('form-bairro').value.trim() || null,
      cidade: document.getElementById('form-cidade').value.trim() || null,
      uf: document.getElementById('form-uf').value.trim() || null,
      pais: document.getElementById('form-pais').value.trim() || 'BR',
      razao_social: TIPO_PESSOA_FORM === 'PJ' ? (document.getElementById('form-razao-social').value.trim() || null) : null,
      nome_fantasia: TIPO_PESSOA_FORM === 'PJ' ? (document.getElementById('form-nome-fantasia').value.trim() || null) : null,
      inscricao_estadual: TIPO_PESSOA_FORM === 'PJ' ? (document.getElementById('form-ie').value.trim() || null) : null,
      inscricao_municipal: TIPO_PESSOA_FORM === 'PJ' ? (document.getElementById('form-im').value.trim() || null) : null,
      regime_tributario: TIPO_PESSOA_FORM === 'PJ' ? (document.getElementById('form-regime').value || null) : null,
    };
    if (id) payload.id = id;

    try {
      var resp = await fetch(urlSalvar(tab), { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload) });
      var data = await resp.json();
      if (!stillMine()) return;
      if (!resp.ok || !data.ok) {
        await rxAlert('Falha ao salvar:\n\n' + (data.error || ('HTTP ' + resp.status)), 'error');
        return;
      }
      showLista();
      await rxAlert((id ? 'Atualizado' : 'Cadastrado') + ' com sucesso!', 'success');
      listar(tab);
    } catch (err) {
      if (!stillMine()) return;
      await rxAlert('Falha de rede:\n\n' + (err.message || err), 'error');
    } finally {
      if (btn && document.body.contains(btn)) {
        btn.dataset.salvando = '';
        btn.disabled = false;
        btn.textContent = 'Salvar';
      }
    }
  }

  /* ============ DESATIVAR / REATIVAR ============ */
  async function desativar(tab, id) {
    var rotulo = tab === 'clientes' ? 'cliente' : 'fornecedor';
    var ok = await rxConfirm(
      'Vai esconder esse ' + rotulo + ' das listas ativas. Você pode reativar mostrando inativos.',
      { title: 'Desativar ' + rotulo + '?', okText: 'Desativar', dangerous: true }
    );
    if (!ok) return;
    await atualizarAtivo(tab, id, false);
  }
  async function reativar(tab, id) {
    await atualizarAtivo(tab, id, true);
  }
  async function atualizarAtivo(tab, id, ativo) {
    var r = DB[tab].find(function(x){ return x.id === id; }) || {};
    try {
      var resp = await fetch(urlSalvar(tab), {
        method: 'POST', headers: authHeaders(),
        body: JSON.stringify({
          id: id, ativo: ativo,
          tipo_pessoa: r.tipo_pessoa, nome: r.nome, documento: r.documento
        }),
      });
      var data = await resp.json();
      if (!stillMine()) return;
      if (!resp.ok || !data.ok) { await rxAlert('Falha: ' + (data.error || ''), 'error'); return; }
      listar(tab);
    } catch (err) {
      if (!stillMine()) return;
      await rxAlert('Falha de rede: ' + err.message, 'error');
    }
  }

  /* ============ UTILS ============ */
  function escHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /* ============ LISTENER no input de razao social ============
     Marca como "tocado" quando o usuario edita manualmente, pra parar
     o auto-mirror nome -> razao social. O elemento esta no DOM neste
     ponto (acabou de ser injetado). Quando o modulo desmonta, o elemento
     sai junto e o listener vai com ele — sem leak. */
  var razSocEl = document.getElementById('form-razao-social');
  if (razSocEl) razSocEl.addEventListener('input', function(){ RAZAO_TOCADA = true; });

  /* ============ PUBLICS (pros onclick=/oninput= inline) ============ */
  var publics = {
    showForm: showForm,
    showLista: showLista,
    editar: editar,
    switchTab: switchTab,
    onBusca: onBusca,
    setChipTipo: setChipTipo,
    toggleInativos: toggleInativos,
    setTipoPessoa: setTipoPessoa,
    onNomeChange: onNomeChange,
    aplicarMascaraDoc: aplicarMascaraDoc,
    aplicarMascaraCEP: aplicarMascaraCEP,
    buscarCEP: buscarCEP,
    submitForm: submitForm,
    desativar: desativar,
    reativar: reativar,
  };
  Object.assign(window, publics);

  /* ============ CLEANUP: rodado pelo router antes de carregar o proximo
     modulo. Deleta os publics e mata timers/intervalos. Listeners attachados
     em elementos do host saem junto com o innerHTML do unmount. */
  (window.__moduleCleanup = window.__moduleCleanup || []).push(function(){
    Object.keys(publics).forEach(function(k){ delete window[k]; });
    if (debounceTimer) { clearTimeout(debounceTimer); debounceTimer = null; }
  });

  /* ============ INIT ============ */
  listar('clientes');
  listar('fornecedores');
})();
</script>
