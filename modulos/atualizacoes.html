<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROMPEX • Atualizações do Sistema</title>
<link rel="icon" type="image/png" href="../Rompex_Favicon_Transparente.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0A0E1A;
  --bg-secondary:#0F172A;
  --bg-tertiary:#1E293B;
  --bg-card:#1E3A52;
  --accent:#10B981;
  --accent-hover:#059669;
  --accent-light:rgba(16,185,129,0.1);
  --text-primary:#F8FAFC;
  --text-secondary:#94A3B8;
  --text-muted:#64748B;
  --border:#1E293B;
  --border-light:#334155;
  --danger:#EF4444;
  --warning:#F59E0B;
  --info:#3B82F6;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 4px 24px rgba(0,0,0,0.4);
  --sidebar-width:280px;
}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  font-size:14px;
  min-height:100vh;
  line-height:1.6;
}
.layout{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-width);
  background:var(--bg-secondary);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:fixed;
  left:0;
  top:0;
  bottom:0;
  z-index:100;
}
.main-content{
  flex:1;
  margin-left:var(--sidebar-width);
  display:flex;
  flex-direction:column;
}
.sidebar-logo{
  padding:24px;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo-icon{
  width:80px;
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo-icon img{
  width:100%;
  height:100%;
  object-fit:contain;
}
.sidebar-nav{
  flex:1;
  padding:16px;
  overflow-y:auto;
}
.nav-section{margin-bottom:24px}
.nav-section-title{
  font-size:11px;
  font-weight:700;
  color:var(--text-muted);
  text-transform:uppercase;
  letter-spacing:0.12em;
  padding:8px 12px 12px;
}
.nav-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px;
  border-radius:var(--radius-sm);
  color:var(--text-secondary);
  cursor:pointer;
  transition:all 0.2s;
  margin-bottom:4px;
  position:relative;
  font-size:14px;
  font-weight:500;
  text-decoration:none;
}
.nav-item svg{
  width:20px;
  height:20px;
  stroke:currentColor;
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
  flex-shrink:0;
}
.nav-item:hover{
  background:rgba(16,185,129,0.08);
  color:var(--text-primary);
}
.nav-item.active{
  background:var(--accent-light);
  color:var(--accent);
  font-weight:600;
}
.nav-item.active::before{
  content:'';
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  width:4px;
  height:20px;
  background:var(--accent);
  border-radius:0 4px 4px 0;
}
.nav-expand-icon{
  margin-left:auto;
  width:16px;
  height:16px;
  transition:transform 0.2s;
}
.nav-item.expanded .nav-expand-icon{
  transform:rotate(90deg);
}
.nav-submenu{
  max-height:0;
  overflow:hidden;
  transition:max-height 0.3s ease;
  padding-left:32px;
}
.nav-submenu.open{
  max-height:500px;
}
.nav-submenu .nav-item{
  font-size:13px;
  padding:10px 12px;
}
.sidebar-user{
  padding:20px;
  border-top:1px solid var(--border);
  display:flex;
  align-items:center;
  gap:12px;
}
.user-avatar{
  width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  font-size:16px;
  color:#fff;
  flex-shrink:0;
}
.user-info{flex:1;min-width:0}
.user-name{
  font-size:14px;
  font-weight:600;
  color:var(--text-primary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.user-role{font-size:12px;color:var(--text-muted)}
.user-menu{cursor:pointer;padding:4px;border-radius:6px;transition:0.2s}
.user-menu:hover{background:var(--bg-tertiary)}
.user-menu svg{width:18px;height:18px;stroke:var(--text-secondary);fill:none}
.topbar{
  background:var(--bg-secondary);
  border-bottom:1px solid var(--border);
  padding:16px 32px;
  display:flex;
  align-items:center;
  gap:20px;
}
.page-title{
  font-size:22px;
  font-weight:700;
  color:var(--text-primary);
  letter-spacing:-0.02em;
}
.page-subtitle{
  font-size:13px;
  color:var(--text-muted);
  margin-top:2px;
}
.content{
  padding:32px;
  flex:1;
  max-width:900px;
  margin:0 auto;
  width:100%;
}
.timeline{
  position:relative;
  padding-left:40px;
}
.timeline::before{
  content:'';
  position:absolute;
  left:10px;
  top:0;
  bottom:0;
  width:2px;
  background:linear-gradient(180deg,var(--accent),transparent);
}
.version{
  position:relative;
  margin-bottom:48px;
  background:var(--bg-secondary);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  box-shadow:var(--shadow);
}
.version::before{
  content:'';
  position:absolute;
  left:-30px;
  top:24px;
  width:20px;
  height:20px;
  background:var(--accent);
  border:3px solid var(--bg-primary);
  border-radius:50%;
}
.version-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
  padding-bottom:16px;
  border-bottom:1px solid var(--border);
}
.version-title{
  font-size:20px;
  font-weight:800;
  color:var(--text-primary);
}
.version-date{
  font-size:13px;
  color:var(--text-muted);
  font-weight:600;
}
.changes-group{
  margin-bottom:20px;
}
.changes-group:last-child{
  margin-bottom:0;
}
.group-title{
  font-size:14px;
  font-weight:700;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:0.1em;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
}
.change-item{
  padding:8px 0;
  padding-left:24px;
  position:relative;
  color:var(--text-secondary);
  line-height:1.6;
}
.change-item::before{
  content:'•';
  position:absolute;
  left:8px;
  color:var(--accent);
  font-weight:900;
}
.badge{
  display:inline-flex;
  padding:4px 10px;
  border-radius:20px;
  font-size:10px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.05em;
  margin-left:8px;
}
.badge-new{background:rgba(16,185,129,0.2);color:var(--accent)}
.badge-fix{background:rgba(59,130,246,0.2);color:#93C5FD}
.badge-improve{background:rgba(245,158,11,0.2);color:#FCD34D}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .main-content{margin-left:0}
}
</style>
</head>
