<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROMPEX Intranet • Login</title>
<link rel="icon" type="image/png" href="Rompex_Favicon_Transparente.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Anti-cache -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0A0E1A;
  --bg-secondary:#0F172A;
  --bg-tertiary:#1E293B;
  --accent:#10B981;
  --accent-hover:#059669;
  --text-primary:#F8FAFC;
  --text-secondary:#94A3B8;
  --text-muted:#64748B;
  --border:#1E293B;
  --border-light:#334155;
  --danger:#EF4444;
  --warning:#F59E0B;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 10px 50px rgba(0,0,0,0.6);
}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#0A0E1A 0%,#0F172A 50%,#1E293B 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';
  position:absolute;
  top:-50%;
  right:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(16,185,129,0.08) 0%,transparent 70%);
  animation:pulse 15s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}
.login-container{
  background:var(--bg-secondary);
  border:1px solid var(--border-light);
  border-radius:20px;
  box-shadow:var(--shadow);
  width:100%;
  max-width:440px;
  overflow:hidden;
  position:relative;
  z-index:1;
  backdrop-filter:blur(20px);
}
.login-header{
  background:linear-gradient(135deg,var(--accent) 0%,#059669 100%);
  padding:48px 32px;
  text-align:center;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.login-header::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);
}
.logo-icon{
  width:240px;
  height:240px;
  margin:0 auto 20px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo-icon img{
  width:100%;
  height:100%;
  object-fit:contain;
}
.login-header h1{
  display:none;
}
.login-header p{
  font-size:15px;
  opacity:0.95;
  font-weight:500;
  position:relative;
}
.login-body{
  padding:40px 32px;
}
.form-group{
  margin-bottom:24px;
}
.form-label{
  display:block;
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.input-wrapper{
  position:relative;
}
.input-icon{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:20px;
  height:20px;
  stroke:var(--text-muted);
  stroke-width:2;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
.form-input{
  width:100%;
  padding:14px 16px 14px 48px;
  background:var(--bg-tertiary);
  border:1px solid var(--border-light);
  border-radius:var(--radius-sm);
  color:var(--text-primary);
  font-size:15px;
  font-family:inherit;
  transition:all 0.2s;
}
.form-input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(16,185,129,0.15);
}
.form-input::placeholder{
  color:var(--text-muted);
}
.login-btn{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,var(--accent) 0%,#059669 100%);
  border:none;
  border-radius:var(--radius-sm);
  color:#fff;
  font-size:15px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.05em;
  cursor:pointer;
  transition:all 0.3s;
  box-shadow:0 4px 16px rgba(16,185,129,0.3);
}
.login-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(16,185,129,0.4);
}
.login-btn:active{
  transform:translateY(0);
}
.demo-info{
  margin-top:24px;
  padding:16px;
  background:rgba(16,185,129,0.08);
  border:1px solid rgba(16,185,129,0.2);
  border-radius:var(--radius-sm);
}
.demo-info-title{
  font-size:12px;
  font-weight:700;
  color:var(--accent);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:0.05em;
  display:flex;
  align-items:center;
  gap:6px;
}
.demo-info-title svg{
  width:16px;
  height:16px;
}
.demo-credentials{
  display:flex;
  flex-direction:column;
  gap:4px;
  font-size:13px;
  color:var(--text-secondary);
}
.demo-credentials code{
  display:inline-flex;
  padding:2px 6px;
  background:var(--bg-tertiary);
  border-radius:4px;
  font-family:'Courier New',monospace;
  color:var(--accent);
  font-size:12px;
}
.login-footer{
  text-align:center;
  padding:24px;
  border-top:1px solid var(--border-light);
  font-size:12px;
  color:var(--text-muted);
}
.error-message{
  margin-top:16px;
  padding:12px 16px;
  background:rgba(239,68,68,0.1);
  border:1px solid rgba(239,68,68,0.3);
  border-radius:var(--radius-sm);
  color:#FCA5A5;
  font-size:13px;
  display:none;
}
.error-message.show{
  display:block;
}
@media(max-width:480px){
  .login-container{
    max-width:100%;
  }
  .login-body{
    padding:32px 24px;
  }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="logo-icon">
      <img src="logo-rompex-white.png" alt="ROMPEX">
    </div>
    <h1>ROMPEX</h1>
    <p>Sistema de Gestão Empresarial</p>
  </div>

  <div class="login-body">
    <form id="login-form" onsubmit="return handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Usuário</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <input 
            type="text" 
            class="form-input" 
            id="username" 
            placeholder="Digite seu usuário"
            required
            autocomplete="username"
          >
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Senha</label>
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input 
            type="password" 
            class="form-input" 
            id="password" 
            placeholder="Digite sua senha"
            required
            autocomplete="current-password"
          >
        </div>
      </div>

      <div class="error-message" id="error-message"></div>

      <button type="submit" class="login-btn">Entrar</button>
    </form>

    <div class="demo-info">
      <div class="demo-info-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/>
          <line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Credenciais de Teste
      </div>
      <div class="demo-credentials">
        <div>Admin: <code>admin</code> / <code>admin123</code></div>
        <div>Compras: <code>compras</code> / <code>compras123</code></div>
        <div>Financeiro: <code>financeiro</code> / <code>fin123</code></div>
      </div>
    </div>
  </div>

  <div class="login-footer">
    Desenvolvido internamente • Versão 3.0.0
  </div>
</div>

<script src="auth.js"></script>
<script>
console.log('🚀 ROMPEX Login v3.0.0');

function handleLogin(event) {
  event.preventDefault();
  
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('error-message');
  
  errorMsg.classList.remove('show');
  
  const resultado = fazerLogin(username, password);
  
  if (resultado.sucesso) {
    window.location.href = 'dashboard.html?v=' + new Date().getTime();
  } else {
    errorMsg.textContent = '❌ ' + resultado.erro;
    errorMsg.classList.add('show');
  }
  
  return false;
}

// Anti-cache: adiciona timestamp na URL ao carregar
if (window.location.search.indexOf('v=') === -1) {
  const newUrl = window.location.pathname + '?v=' + new Date().getTime();
  window.history.replaceState({}, '', newUrl);
}
</script>
<script src="theme.js"></script>

</body>
</html>
