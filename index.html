<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rompex Intranet - Login</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #208C4F;
      --primary-dark: #186A3B;
      --primary-light: #D4EDDA;
      --danger: #EF4444;
      --text: #1F2937;
      --text-light: #6B7280;
      --bg: #F9FAFB;
      --white: #FFFFFF;
      --border: #E5E7EB;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #208C4F 0%, #186A3B 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .login-header {
      background: linear-gradient(135deg, #208C4F 0%, #186A3B 100%);
      padding: 40px 30px;
      text-align: center;
      color: var(--white);
    }

    .login-header img {
      height: 50px;
      margin-bottom: 20px;
      mix-blend-mode: lighten;
      filter: brightness(1.1);
    }

    .login-header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .login-body {
      padding: 40px 30px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: var(--text-light);
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      font-size: 15px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }

    .btn-login {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      color: var(--white);
      background: linear-gradient(135deg, #208C4F 0%, #186A3B 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(32, 140, 79, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-message {
      background: #FEE2E2;
      color: #991B1B;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      border-left: 4px solid var(--danger);
    }

    .error-message.show {
      display: block;
      animation: shake 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    .login-footer {
      padding: 20px 30px;
      background: var(--bg);
      text-align: center;
      font-size: 13px;
      color: var(--text-light);
      border-top: 1px solid var(--border);
    }

    .demo-credentials {
      background: var(--primary-light);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 13px;
      line-height: 1.6;
    }

    .demo-credentials strong {
      display: block;
      color: var(--primary-dark);
      margin-bottom: 8px;
    }

    .demo-credentials code {
      background: var(--white);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: var(--text);
    }

    @media (max-width: 480px) {
      .login-header {
        padding: 30px 20px;
      }

      .login-header h1 {
        font-size: 24px;
      }

      .login-body {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <img src="logo-rompex-white.png" alt="Rompex" style="height: 50px; margin-bottom: 20px;">
      <h1>Intranet Rompex</h1>
      <p>Sistema de Gestão Empresarial</p>
    </div>

    <div class="login-body">
      <div class="demo-credentials">
        <strong>👤 Credenciais de Teste:</strong>
        Admin: <code>admin</code> / <code>admin123</code><br>
        Compras: <code>compras</code> / <code>compras123</code><br>
        Financeiro: <code>financeiro</code> / <code>fin123</code>
      </div>

      <div id="errorMsg" class="error-message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Usuário</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input 
              type="text" 
              id="username" 
              placeholder="Digite seu usuário"
              autocomplete="username"
              required
            >
          </div>
        </div>

        <div class="form-group">
          <label>Senha</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input 
              type="password" 
              id="password" 
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            >
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          Entrar
        </button>
      </form>
    </div>

    <div class="login-footer">
      Desenvolvido internamente • Versão 1.0.0
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Redirecionar se já estiver logado
    if (obterSessao()) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      // Validação básica
      if (!username || !password) {
        mostrarErro('Preencha todos os campos');
        return;
      }

      // Desabilitar botão durante login
      btnLogin.disabled = true;
      btnLogin.textContent = 'Entrando...';

      // Simular delay de rede (remover em produção se não usar backend)
      setTimeout(function() {
        const resultado = fazerLogin(username, password);

        if (resultado.sucesso) {
          window.location.href = 'dashboard.html';
        } else {
          mostrarErro(resultado.erro);
          btnLogin.disabled = false;
          btnLogin.textContent = 'Entrar';
          document.getElementById('password').value = '';
        }
      }, 500);
    });

    function mostrarErro(mensagem) {
      errorMsg.textContent = mensagem;
      errorMsg.classList.add('show');
      
      setTimeout(function() {
        errorMsg.classList.remove('show');
      }, 3000);
    }

    // Limpar mensagem de erro ao digitar
    document.getElementById('username').addEventListener('input', function() {
      errorMsg.classList.remove('show');
    });

    document.getElementById('password').addEventListener('input', function() {
      errorMsg.classList.remove('show');
    });

    // Focar no campo de usuário
    document.getElementById('username').focus();
  </script>
</body>
</html>
