<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ROMPEX Intranet • Login</title>
<link rel="icon" type="image/png" href="Rompex_Favicon_Transparente.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-primary:#0A0E1A;
  --bg-secondary:#0F172A;
  --bg-tertiary:#1E293B;
  --accent:#10B981;
  --accent-hover:#059669;
  --text-primary:#F8FAFC;
  --text-secondary:#94A3B8;
  --text-muted:#64748B;
  --border:#1E293B;
  --border-light:#334155;
  --danger:#EF4444;
  --warning:#F59E0B;
  --radius:14px;
  --radius-sm:10px;
  --shadow:0 10px 50px rgba(0,0,0,0.6);
}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:linear-gradient(135deg,#0A0E1A 0%,#0F172A 50%,#1E293B 100%);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';
  position:absolute;
  top:-50%;
  right:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(16,185,129,0.08) 0%,transparent 70%);
  animation:pulse 15s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.1)}
}
.login-container{
  background:var(--bg-secondary);
  border:1px solid var(--border-light);
  border-radius:20px;
  box-shadow:var(--shadow);
  width:100%;
  max-width:440px;
  overflow:hidden;
  position:relative;
  z-index:1;
  backdrop-filter:blur(20px);
}
.login-header{
  background:linear-gradient(135deg,var(--accent) 0%,#059669 100%);
  padding:48px 32px;
  text-align:center;
  color:#fff;
  position:relative;
  overflow:hidden;
}
.login-header::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);
}
.logo-icon{
  width:120px;
  height:120px;
  margin:0 auto 20px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo-icon img{
  width:100%;
  height:100%;
  object-fit:contain;
  filter:brightness(0) invert(1);
}
.login-header h1{
  font-size:32px;
  font-weight:800;
  margin-bottom:8px;
  letter-spacing:-0.02em;
  position:relative;
}
.login-header p{
  font-size:15px;
  opacity:0.95;
  position:relative;
}
.login-body{
  padding:40px 32px;
}
.demo-credentials{
  background:rgba(16,185,129,0.1);
  border:1px solid rgba(16,185,129,0.3);
  padding:16px;
  border-radius:var(--radius-sm);
  margin-bottom:24px;
  font-size:13px;
  line-height:1.7;
  color:var(--text-secondary);
}
.demo-credentials strong{
  display:block;
  color:var(--accent);
  margin-bottom:8px;
  font-size:12px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.demo-credentials code{
  background:var(--bg-tertiary);
  padding:2px 8px;
  border-radius:6px;
  font-family:'Courier New',monospace;
  color:var(--text-primary);
  font-weight:600;
}
.error-message{
  background:rgba(239,68,68,0.15);
  border:1px solid rgba(239,68,68,0.4);
  color:#FCA5A5;
  padding:12px 16px;
  border-radius:var(--radius-sm);
  font-size:13px;
  margin-bottom:20px;
  display:none;
  border-left:4px solid var(--danger);
  animation:shake 0.3s;
}
.error-message.show{
  display:block;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-10px)}
  75%{transform:translateX(10px)}
}
.form-group{
  margin-bottom:20px;
}
.form-group label{
  display:block;
  font-size:13px;
  font-weight:600;
  color:var(--text-secondary);
  margin-bottom:8px;
  text-transform:uppercase;
  letter-spacing:0.05em;
}
.input-wrapper{
  position:relative;
}
.input-icon{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  width:20px;
  height:20px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.input-icon svg{
  width:20px;
  height:20px;
  stroke:var(--text-muted);
  stroke-width:2;
  fill:none;
}
.form-group input{
  width:100%;
  padding:14px 16px 14px 48px;
  font-size:15px;
  border:2px solid var(--border-light);
  border-radius:var(--radius-sm);
  font-family:'Inter',sans-serif;
  transition:all 0.2s;
  background:var(--bg-tertiary);
  color:var(--text-primary);
}
.form-group input:focus{
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(16,185,129,0.15);
  background:var(--bg-secondary);
}
.form-group input:focus + .input-icon svg{
  stroke:var(--accent);
}
.btn-login{
  width:100%;
  padding:16px;
  font-size:16px;
  font-weight:700;
  color:#fff;
  background:linear-gradient(135deg,var(--accent) 0%,#059669 100%);
  border:none;
  border-radius:var(--radius-sm);
  cursor:pointer;
  transition:all 0.2s;
  font-family:'Inter',sans-serif;
  text-transform:uppercase;
  letter-spacing:0.05em;
  box-shadow:0 4px 20px rgba(16,185,129,0.3);
}
.btn-login:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(16,185,129,0.4);
}
.btn-login:active{
  transform:translateY(0);
}
.btn-login:disabled{
  opacity:0.6;
  cursor:not-allowed;
  transform:none;
}
.login-footer{
  padding:24px 32px;
  background:var(--bg-tertiary);
  text-align:center;
  font-size:12px;
  color:var(--text-muted);
  border-top:1px solid var(--border);
}
@media(max-width:480px){
  .login-header{
    padding:36px 24px;
  }
  .login-header h1{
    font-size:28px;
  }
  .login-body{
    padding:32px 24px;
  }
}
</style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="logo-icon">
      <img src="logo-rompex-white.png" alt="ROMPEX">
    </div>
    <h1>ROMPEX</h1>
    <p>Sistema de Gestão Empresarial</p>
  </div>

  <div class="login-body">
    <div class="demo-credentials">
      <strong>🔑 Credenciais de Teste:</strong>
      Admin: <code>admin</code> / <code>admin123</code><br>
      Compras: <code>compras</code> / <code>compras123</code><br>
      Financeiro: <code>financeiro</code> / <code>fin123</code>
    </div>

    <div id="errorMsg" class="error-message"></div>

    <form id="loginForm">
      <div class="form-group">
        <label>Usuário</label>
        <div class="input-wrapper">
          <input 
            type="text" 
            id="username" 
            placeholder="Digite seu usuário"
            autocomplete="username"
            required
          >
          <div class="input-icon">
            <svg viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Senha</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            placeholder="Digite sua senha"
            autocomplete="current-password"
            required
          >
          <div class="input-icon">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-login" id="btnLogin">
        Entrar
      </button>
    </form>
  </div>

  <div class="login-footer">
    Desenvolvido internamente • Versão 2.0.0
  </div>
</div>

<script src="auth.js"></script>
<script>
if (obterSessao()) {
  window.location.href = 'dashboard.html';
}

const form = document.getElementById('loginForm');
const btnLogin = document.getElementById('btnLogin');
const errorMsg = document.getElementById('errorMsg');

form.addEventListener('submit', function(e) {
  e.preventDefault();
  
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    mostrarErro('Preencha todos os campos');
    return;
  }

  btnLogin.disabled = true;
  btnLogin.textContent = 'Entrando...';

  setTimeout(function() {
    const resultado = fazerLogin(username, password);

    if (resultado.sucesso) {
      window.location.href = 'dashboard.html';
    } else {
      mostrarErro(resultado.erro);
      btnLogin.disabled = false;
      btnLogin.textContent = 'Entrar';
      document.getElementById('password').value = '';
    }
  }, 500);
});

function mostrarErro(mensagem) {
  errorMsg.textContent = mensagem;
  errorMsg.classList.add('show');
  
  setTimeout(function() {
    errorMsg.classList.remove('show');
  }, 3000);
}

document.getElementById('username').addEventListener('input', function() {
  errorMsg.classList.remove('show');
});

document.getElementById('password').addEventListener('input', function() {
  errorMsg.classList.remove('show');
});

document.getElementById('username').focus();
</script>

</body>
</html>
